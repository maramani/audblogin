<!DOCTYPE html>
<html>
<head>
<title>Alumni Portal Login</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  height: 100vh;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Card */
.container {
  background: #ffffff;
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  text-align: center;
}

/* Logo */
.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2a5298;
  margin-bottom: 10px;
}

/* Subtitle */
.subtitle {
  font-size: 14px;
  color: #777;
  margin-bottom: 25px;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* Password container */
.password-box {
  position: relative;
}

.toggle {
  position: absolute;
  right: 10px;
  top: 14px;
  cursor: pointer;
  font-size: 12px;
  color: #555;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #2a5298;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1e3c72;
}

/* Error */
.error {
  color: red;
  font-size: 13px;
  margin-top: 10px;
}

/* Footer */
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>

</head>

<body>

<div class="container">

  <div class="logo">Alumni DB Portal</div>
  <div class="subtitle">Authorized Access Only</div>

  <input type="text" id="user" placeholder="User ID">

  <div class="password-box">
    <input type="password" id="pass" placeholder="Password">
    <span class="toggle" onclick="togglePass()">Show</span>
  </div>

  <button onclick="login()">Login</button>

  <div id="msg" class="error"></div>

  <div class="footer">© Alumni Portal</div>

</div>

<script>

let attempts = 0;

function togglePass() {
  var x = document.getElementById("pass");
  if (x.type === "password") {
    x.type = "text";
  } else {
    x.type = "password";
  }
}

function login() {

  var user = document.getElementById("user").value;
  var pass = document.getElementById("pass").value;

  // Example credentials
  if(user=="au89ce" && pass=="db2026") {
    window.location.href = "https://sites.google.com/view/annamalai89ce";
  } 
  else {
    attempts++;
    document.getElementById("msg").innerHTML = "Invalid User ID or Password";

    if(attempts >= 3) {
      document.getElementById("msg").innerHTML = "Too many attempts. Try later.";
    }
  }
}

</script>

</body>
</html>
