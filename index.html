<!DOCTYPE html>
<html>
<head>
<title>DB Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  background: linear-gradient(to right, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

.error {
  color: red;
  font-size: 13px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Database Login</h2>

  <input type="password" id="pass" placeholder="Enter Password">

  <button onclick="check()">Login</button>

  <div id="msg" class="error"></div>
</div>

<script>
function check() {
  var p = document.getElementById("pass").value;

  if(p == "db2026") {
    window.location.href = "https://forms.gle/YOURFORM";
  } else {
    document.getElementById("msg").innerHTML = "Incorrect password!";
  }
}
</script>

</body>
</html>
